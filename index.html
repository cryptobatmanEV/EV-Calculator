<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cave Calculators | The +EV Cave</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0d0f;font-family:'IBM Plex Mono',monospace;color:#fff;}

    /* ── Tab bar ── */
    .tab-bar{display:flex;border-bottom:1px solid rgba(255,255,255,0.07);margin-bottom:20px;}
    .tab-btn{flex:1;padding:14px 10px;background:transparent;border:none;color:rgba(255,255,255,0.35);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1.5px;cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;margin-bottom:-1px;}
    .tab-btn:hover{color:rgba(255,255,255,0.6);}
    .tab-btn.active{color:#00dc6e;border-bottom-color:#00dc6e;}

    /* ── Shared card/input styles ── */
    .card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:2px;padding:16px 20px;margin-bottom:12px;}
    .label-sm{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:2px;margin-bottom:12px;}
    .tool-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:2px;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;padding:14px 16px;outline:none;transition:all .15s;text-align:center;}
    .tool-input:focus{border-color:rgba(0,220,110,0.5);background:rgba(0,220,110,0.05);}
    .tool-input::placeholder{color:rgba(255,255,255,0.2);font-size:14px;font-weight:400;}
    .tool-input.pass{border-color:#00dc6e;}
    .tool-input.fail{border-color:#ff4d4d;}
    .tool-input.auto-fill{background:rgba(0,220,110,0.08);border-color:rgba(0,220,110,0.3);color:#00dc6e;font-size:18px;}
    .pill-btn{background:transparent;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.45);padding:7px 14px;border-radius:2px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.5px;transition:all .15s;white-space:nowrap;}
    .pill-btn:hover{border-color:rgba(0,220,110,0.4);color:rgba(255,255,255,0.7);}
    .pill-btn.active{background:rgba(0,220,110,0.12);border-color:#00dc6e;color:#00dc6e;}
    .mode-btn{flex:1;padding:10px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.4);font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;letter-spacing:1px;}
    .mode-btn:first-child{border-radius:2px 0 0 2px;}
    .mode-btn:last-child{border-radius:0 2px 2px 0;border-left:none;}
    .mode-btn.active{background:rgba(0,220,110,0.15);border-color:#00dc6e;color:#00dc6e;font-weight:700;}
    .stat-pill{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:2px;padding:10px 16px;flex:1;text-align:center;}
    .hint{font-size:10px;color:rgba(255,255,255,0.25);text-align:center;margin-top:4px;}

    /* ── EV result ── */
    .result-box{border-radius:2px;padding:24px;text-align:center;opacity:0;transform:translateY(6px);transition:opacity .3s,transform .3s;}
    .result-box.show{opacity:1;transform:translateY(0);}
    .result-pass{background:rgba(0,220,110,0.1);border:1px solid rgba(0,220,110,0.35);}
    .result-fail{background:rgba(255,77,77,0.08);border:1px solid rgba(255,77,77,0.3);}
    .leg-badge{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
    .badge-neutral{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);}
    .badge-pass{background:rgba(0,220,110,0.2);color:#00dc6e;}
    .badge-fail{background:rgba(255,77,77,0.2);color:#ff6b6b;}

    /* ── Arb styles ── */
    .book-block{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:2px;padding:14px 16px;margin-bottom:10px;}
    .book-block.arb-active{border-color:rgba(0,220,110,0.25);background:rgba(0,220,110,0.03);}
    .book-title{font-size:11px;font-weight:700;color:rgba(255,255,255,0.6);margin-bottom:12px;letter-spacing:1px;}
    .field-row{display:flex;gap:10px;margin-bottom:10px;}
    .field-row:last-child{margin-bottom:0;}
    .field-wrap{flex:1;display:flex;flex-direction:column;gap:5px;}
    .field-label{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1.5px;}
    .fi{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:2px;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;padding:11px 14px;outline:none;transition:all .15s;text-align:center;}
    .fi:focus{border-color:rgba(0,220,110,0.5);background:rgba(0,220,110,0.04);}
    .fi::placeholder{color:rgba(255,255,255,0.2);font-size:13px;font-weight:400;}
    .fi-book{font-size:12px;text-align:left;padding:10px 14px;}
    .implied{font-size:10px;color:rgba(255,255,255,0.3);text-align:center;margin-top:4px;}
    .result-section{border-radius:2px;padding:20px;margin-bottom:12px;}
    .result-arb{background:rgba(0,220,110,0.07);border:1px solid rgba(0,220,110,0.25);}
    .result-noarb{background:rgba(255,77,77,0.05);border:1px solid rgba(255,77,77,0.15);}
    .stat-row{display:flex;gap:8px;margin-top:14px;}
    .stat-box{flex:1;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:2px;padding:11px 8px;text-align:center;}
    .stat-box .sl{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1.5px;margin-bottom:5px;}
    .stat-box .sv{font-size:17px;font-weight:700;font-family:'Syne',sans-serif;}
    .payout-row{display:flex;gap:8px;margin-top:10px;}
    .payout-box{flex:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:2px;padding:10px;text-align:center;}
    .payout-box .pl{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1px;margin-bottom:4px;}
    .payout-box .pv{font-size:14px;font-weight:700;color:#00dc6e;}
    .divider{height:1px;background:rgba(255,255,255,0.06);margin:14px 0;}
    .tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;}
    .tag-arb{background:rgba(0,220,110,0.15);border:1px solid rgba(0,220,110,0.3);color:#00dc6e;}
    .tag-noarb{background:rgba(255,77,77,0.1);border:1px solid rgba(255,77,77,0.25);color:#ff6b6b;}
    .arrow-divider{text-align:center;padding:4px 0;font-size:16px;color:rgba(255,255,255,0.15);}
    .big-number{font-family:'Syne',sans-serif;font-weight:800;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

// ══════════════════════════════════════════════════════════════════════════════
// SHARED UTILITIES
// ══════════════════════════════════════════════════════════════════════════════
function oddsToProb(odds) {
  const n = parseFloat(odds);
  if (isNaN(n)) return null;
  if (n < 0) return (Math.abs(n) / (Math.abs(n) + 100)) * 100;
  return (100 / (n + 100)) * 100;
}

function toDecimal(raw, mode) {
  if (!raw || raw.trim() === "" || raw.trim() === "-") return null;
  if (mode === "decimal") {
    const n = parseFloat(raw);
    return (!isNaN(n) && n > 1) ? n : null;
  }
  const n = parseFloat(raw);
  if (isNaN(n)) return null;
  if (n > 0) return (n / 100) + 1;
  if (n < 0) return (100 / Math.abs(n)) + 1;
  return null;
}

function fmt(n) { return "$" + Math.abs(n).toFixed(2); }

// ══════════════════════════════════════════════════════════════════════════════
// EV CALCULATOR
// ══════════════════════════════════════════════════════════════════════════════
const APP_CONFIG = {
  PrizePicks: { slipTypes: [
    {label:"3-Leg Power", legs:3, type:"Power", threshold:58.33, thresholdOdds:-140, thresholdPct:55.0},
    {label:"5/6-Leg Flex",legs:5, type:"Flex",  threshold:57.63, thresholdOdds:-136, thresholdPct:54.3},
  ]},
  Underdog: { slipTypes: [
    {label:"3-Leg Power",legs:3, type:"Power", threshold:56.52, thresholdOdds:-130, thresholdPct:55.0},
    {label:"6-Leg Flex", legs:6, type:"Flex",  threshold:56.52, thresholdOdds:-130, thresholdPct:53.8},
  ]},
  Betr: { slipTypes: [
    {label:"3-Leg Power",legs:3, type:"Power", threshold:58.33, thresholdOdds:-140, thresholdPct:55.0},
    {label:"5-Leg Flex", legs:5, type:"Flex",  threshold:57.63, thresholdOdds:-136, thresholdPct:54.2},
  ]},
  Dabble: { slipTypes: [
    {label:"3-Leg Power",legs:3, type:"Power", threshold:58.33, thresholdOdds:-140, thresholdPct:55.0},
    {label:"5-Leg Power",legs:5, type:"Power", threshold:58.33, thresholdOdds:-140, thresholdPct:55.0},
  ]},
  "DraftKings Pick 6": { slipTypes: [
    {label:"3-Leg Power",legs:3, type:"Power", threshold:58.33, thresholdOdds:-140, thresholdPct:55.0},
  ]},
  "Parlayplay / Sleeper / Fliff": { slipTypes: [
    {label:"Any Props (2% EV+)",legs:1, type:"EV", threshold:2.0, thresholdOdds:null, thresholdPct:2.0, evMode:true},
  ]},
};

const APPS = Object.keys(APP_CONFIG);

function EVCalculator() {
  const [selectedApp, setSelectedApp]     = useState("PrizePicks");
  const [selectedSlipIdx, setSlipIdx]     = useState(0);
  const [inputMode, setInputMode]         = useState("odds");
  const [props, setProps]                 = useState(["","",""]);
  const [animateResult, setAnimateResult] = useState(false);

  const slip    = APP_CONFIG[selectedApp].slipTypes[selectedSlipIdx];
  const isEV    = slip.evMode;
  const numLegs = isEV ? 1 : slip.legs;

  useEffect(()=>{ setProps(Array(numLegs).fill("")); setSlipIdx(0); }, [selectedApp]);
  useEffect(()=>{ setProps(Array(numLegs).fill("")); }, [selectedSlipIdx, inputMode]);

  const handleChange=(i,v)=>{ const u=[...props]; u[i]=v; setProps(u); };

  const legEvals = props.map(v=>{
    if(v===""||v==="-") return null;
    if(isEV){ const n=parseFloat(v); return isNaN(n)?null:{value:n,prob:n,pass:n>=slip.threshold}; }
    if(inputMode==="odds"){
      const prob=oddsToProb(v); if(prob===null) return null;
      return{value:parseFloat(v),prob,pass:prob>=slip.threshold};
    }
    const n=parseFloat(v); if(isNaN(n)) return null;
    return{value:n,prob:n,pass:n>=slip.thresholdPct};
  });

  const allFilled   = legEvals.length===numLegs&&legEvals.every(e=>e!==null);
  const avgProb     = allFilled&&!isEV ? legEvals.reduce((a,b)=>a+b.prob,0)/legEvals.length : null;
  const threshCheck = inputMode==="odds"?slip.threshold:slip.thresholdPct;
  const overallPass = allFilled&&(isEV?legEvals[0].prob>=slip.threshold:avgProb>=threshCheck);

  useEffect(()=>{
    if(allFilled){setAnimateResult(false);setTimeout(()=>setAnimateResult(true),10);}
  },[allFilled,overallPass,props.join(",")]);

  const displayThreshold = isEV?"2% EV+":inputMode==="odds"?`${slip.thresholdOdds} or better`:`${slip.thresholdPct}%+`;
  const cols = numLegs<=3?numLegs:3;

  return (
    <div>
      {/* Input mode */}
      <div className="card">
        <div className="label-sm">INPUT MODE</div>
        <div style={{display:"flex"}}>
          <button className={"mode-btn"+(inputMode==="odds"?" active":"")} onClick={()=>setInputMode("odds")}>AMERICAN ODDS (+/-)</button>
          <button className={"mode-btn"+(inputMode==="pct"?" active":"")} onClick={()=>setInputMode("pct")}>% PROBABILITY</button>
        </div>
        <div style={{marginTop:8,fontSize:10,color:"rgba(255,255,255,0.25)"}}>
          {inputMode==="odds"?"Enter the American odds from your sportsbook line, e.g. -145 or +110":"Enter the implied probability % from your DGF tool, e.g. 56.5"}
        </div>
      </div>

      {/* App */}
      <div className="card">
        <div className="label-sm">SELECT APP</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {APPS.map(app=>(
            <button key={app} className={"pill-btn"+(selectedApp===app?" active":"")}
              onClick={()=>{setSelectedApp(app);setSlipIdx(0);}}>
              {app}
            </button>
          ))}
        </div>
      </div>

      {/* Slip type */}
      <div className="card">
        <div className="label-sm">SLIP TYPE</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {APP_CONFIG[selectedApp].slipTypes.map((s,i)=>(
            <button key={i} className={"pill-btn"+(selectedSlipIdx===i?" active":"")}
              onClick={()=>setSlipIdx(i)}>{s.label}</button>
          ))}
        </div>
        <div style={{marginTop:14,display:"flex",gap:10}}>
          <div className="stat-pill">
            <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"1.5px"}}>MIN THRESHOLD</div>
            <div style={{fontSize:14,fontWeight:700,color:"#00dc6e",marginTop:3}}>{displayThreshold}</div>
          </div>
          <div className="stat-pill">
            <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"1.5px"}}>TYPE</div>
            <div style={{fontSize:14,fontWeight:700,color:"#fff",marginTop:3}}>{slip.type}</div>
          </div>
          {!isEV&&<div className="stat-pill">
            <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"1.5px"}}>LEGS</div>
            <div style={{fontSize:14,fontWeight:700,color:"#fff",marginTop:3}}>{slip.legs}</div>
          </div>}
        </div>
      </div>

      {/* Inputs */}
      <div className="card">
        <div className="label-sm">
          {isEV?"ENTER EV %":inputMode==="odds"?"ENTER AMERICAN ODDS PER LEG":"ENTER % PROBABILITY PER LEG"}
        </div>
        <div style={{display:"grid",gridTemplateColumns:`repeat(${cols},1fr)`,gap:10}}>
          {props.map((val,i)=>{
            const ev=legEvals[i]; const hasV=ev!==null;
            const pass=hasV&&ev.pass;
            return(
              <div key={i} style={{display:"flex",flexDirection:"column",gap:6}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div className={`leg-badge ${!hasV?"badge-neutral":pass?"badge-pass":"badge-fail"}`}>{i+1}</div>
                  <span style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>LEG {i+1}</span>
                </div>
                <input type="text" inputMode="decimal"
                  className={`tool-input ${!hasV?"":pass?"pass":"fail"}`}
                  placeholder={inputMode==="odds"?"-145":"56.5"}
                  value={val} onChange={e=>handleChange(i,e.target.value)}/>
                {hasV&&inputMode==="odds"&&<div className="hint">{ev.prob.toFixed(1)}% implied prob</div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Result */}
      {allFilled&&(
        <div className={`result-box ${animateResult?"show":""} ${overallPass?"result-pass":"result-fail"}`}>
          <div style={{fontSize:32,fontFamily:"'Syne',sans-serif",fontWeight:800,letterSpacing:"-0.5px",color:overallPass?"#00dc6e":"#ff6b6b"}}>
            {overallPass?"✓ PLAY IT":"✗ SKIP IT"}
          </div>
          <div style={{marginTop:6,fontSize:12,color:"rgba(255,255,255,0.5)"}}>
            {overallPass?`Avg meets ${displayThreshold} threshold. This slip is +EV.`:`Avg falls below ${displayThreshold}. Don't force it.`}
          </div>
          {!isEV&&avgProb!==null&&(
            <div style={{marginTop:16,display:"flex",justifyContent:"center",gap:24}}>
              <div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"1.5px"}}>AVG PROB</div>
                <div style={{fontSize:20,fontWeight:700,color:"#fff",marginTop:2}}>{avgProb.toFixed(1)}%</div>
              </div>
              <div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"1.5px"}}>NEED</div>
                <div style={{fontSize:20,fontWeight:700,color:"rgba(255,255,255,0.5)",marginTop:2}}>
                  {inputMode==="odds"?`${slip.threshold.toFixed(1)}%`:`${slip.thresholdPct}%`}
                </div>
              </div>
              <div>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"1.5px"}}>EDGE</div>
                <div style={{fontSize:20,fontWeight:700,marginTop:2,color:overallPass?"#00dc6e":"#ff6b6b"}}>
                  {inputMode==="odds"?`${(avgProb-slip.threshold).toFixed(2)}%`:`${(avgProb-slip.thresholdPct).toFixed(2)}%`}
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      <div style={{marginTop:16,textAlign:"center",fontSize:10,color:"rgba(255,255,255,0.15)",letterSpacing:"1px"}}>
        BASED ON "JOINING THE 5%" THRESHOLDS · NOT FINANCIAL ADVICE
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// ARB CALCULATOR
// ══════════════════════════════════════════════════════════════════════════════
function ArbCalculator() {
  const [mode,setMode]     = useState("american");
  const [book1,setBook1]   = useState("");
  const [book2,setBook2]   = useState("");
  const [odds1,setOdds1]   = useState("");
  const [odds2,setOdds2]   = useState("");
  const [stake1,setStake1] = useState("");
  const [show,setShow]     = useState(false);

  const d1=toDecimal(odds1,mode);
  const d2=toDecimal(odds2,mode);
  const s1=parseFloat(stake1);

  const hasOdds  = d1&&d2;
  const hasStake = hasOdds&&!isNaN(s1)&&s1>0;
  const arbPct   = hasOdds?((1/d1)+(1/d2))*100:null;
  const isArb    = arbPct!==null&&arbPct<100;
  const stake2   = hasStake?(s1*d1)/d2:null;
  const totalStaked = hasStake&&stake2?s1+stake2:null;
  const payout1  = hasStake?s1*d1:null;
  const payout2  = hasStake&&stake2?stake2*d2:null;
  const profit   = hasStake&&totalStaked&&isArb?payout1-totalStaked:null;
  const roi      = profit&&totalStaked?(profit/totalStaked*100):null;

  useEffect(()=>{
    if(hasOdds){setShow(false);setTimeout(()=>setShow(true),20);}
  },[odds1,odds2,stake1,hasOdds]);

  const placeholder=mode==="american"?"-110":"1.91";

  return(
    <div>
      {/* Odds format */}
      <div className="card">
        <div className="label-sm">ODDS FORMAT</div>
        <div style={{display:"flex"}}>
          <button className={"mode-btn"+(mode==="american"?" active":"")} onClick={()=>setMode("american")}>AMERICAN (+/-)</button>
          <button className={"mode-btn"+(mode==="decimal"?" active":"")} onClick={()=>setMode("decimal")}>DECIMAL</button>
        </div>
      </div>

      {/* Book 1 */}
      <div className={`book-block ${isArb&&hasStake?"arb-active":""}`}>
        <div className="book-title">BOOK 1</div>
        <div className="field-row">
          <div className="field-wrap">
            <div className="field-label">SPORTSBOOK</div>
            <input className="fi fi-book" type="text" placeholder="e.g. DraftKings"
              value={book1} onChange={e=>setBook1(e.target.value)}/>
          </div>
        </div>
        <div className="field-row">
          <div className="field-wrap">
            <div className="field-label">ODDS</div>
            <input className="fi" type="text" inputMode="decimal"
              placeholder={placeholder} value={odds1} onChange={e=>setOdds1(e.target.value)}/>
            {d1&&<div className="implied">{(1/d1*100).toFixed(1)}% implied · {d1.toFixed(3)} decimal</div>}
          </div>
          <div className="field-wrap">
            <div className="field-label">YOUR BET AMOUNT</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:16,color:"rgba(255,255,255,0.3)",fontWeight:700,flexShrink:0}}>$</span>
              <input className="fi" type="number" min="1" step="1"
                placeholder="100" value={stake1} onChange={e=>setStake1(e.target.value)} style={{flex:1}}/>
            </div>
            {payout1&&<div className="implied">Returns {fmt(payout1)} if win</div>}
          </div>
        </div>
      </div>

      <div className="arrow-divider">↕</div>

      {/* Book 2 */}
      <div className={`book-block ${isArb&&hasStake?"arb-active":""}`}>
        <div className="book-title">BOOK 2</div>
        <div className="field-row">
          <div className="field-wrap">
            <div className="field-label">SPORTSBOOK</div>
            <input className="fi fi-book" type="text" placeholder="e.g. FanDuel"
              value={book2} onChange={e=>setBook2(e.target.value)}/>
          </div>
        </div>
        <div className="field-row">
          <div className="field-wrap">
            <div className="field-label">ODDS</div>
            <input className="fi" type="text" inputMode="decimal"
              placeholder={placeholder} value={odds2} onChange={e=>setOdds2(e.target.value)}/>
            {d2&&<div className="implied">{(1/d2*100).toFixed(1)}% implied · {d2.toFixed(3)} decimal</div>}
          </div>
          <div className="field-wrap">
            <div className="field-label">BET AMOUNT NEEDED</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:16,color:stake2?"#00dc6e":"rgba(255,255,255,0.3)",fontWeight:700,flexShrink:0}}>$</span>
              <div className={`fi ${stake2?"auto-fill":""}`}
                style={{display:"flex",alignItems:"center",justifyContent:"center",cursor:"default",height:46,flex:1}}>
                {stake2
                  ?stake2.toFixed(2)
                  :<span style={{fontSize:13,fontWeight:400,color:"rgba(255,255,255,0.2)"}}>auto-calculated</span>}
              </div>
            </div>
            {payout2&&<div className="implied" style={{color:"rgba(0,220,110,0.5)"}}>Returns {fmt(payout2)} if win</div>}
          </div>
        </div>
      </div>

      {/* Result */}
      {hasOdds&&show&&(
        <div className={`result-section ${isArb?"result-arb":"result-noarb"}`}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
            <span className={`tag ${isArb?"tag-arb":"tag-noarb"}`}>{isArb?"✓ ARB FOUND":"✗ NO ARB"}</span>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",marginBottom:2}}>COMBINED IMPLIED</div>
              <div className="big-number" style={{fontSize:24,color:isArb?"#00dc6e":"#ff6b6b"}}>{arbPct.toFixed(2)}%</div>
            </div>
          </div>

          {isArb&&<div style={{marginTop:6,fontSize:11,color:"rgba(255,255,255,0.4)"}}>
            {(100-arbPct).toFixed(2)}% margin — guaranteed profit on any outcome
          </div>}
          {!isArb&&<div style={{marginTop:8,fontSize:11,color:"rgba(255,255,255,0.35)"}}>
            {(arbPct-100).toFixed(2)}% over 100%. Try finding better odds on one side.
          </div>}

          {isArb&&hasStake&&profit!==null&&(
            <>
              <div className="divider"/>
              <div className="stat-row">
                <div className="stat-box">
                  <div className="sl">TOTAL STAKED</div>
                  <div className="sv" style={{color:"#fff"}}>{fmt(totalStaked)}</div>
                </div>
                <div className="stat-box">
                  <div className="sl">PROFIT</div>
                  <div className="sv" style={{color:"#00dc6e"}}>{fmt(profit)}</div>
                </div>
                <div className="stat-box">
                  <div className="sl">ROI</div>
                  <div className="sv" style={{color:"#00dc6e"}}>{roi.toFixed(2)}%</div>
                </div>
              </div>
              <div className="divider"/>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"1px",marginBottom:8}}>PAYOUT CHECK</div>
              <div className="payout-row">
                <div className="payout-box">
                  <div className="pl">{book1||"BOOK 1"} WINS</div>
                  <div className="pv">{fmt(payout1)}</div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.25)",marginTop:3}}>profit {fmt(payout1-totalStaked)}</div>
                </div>
                <div className="payout-box">
                  <div className="pl">{book2||"BOOK 2"} WINS</div>
                  <div className="pv">{fmt(payout2)}</div>
                  <div style={{fontSize:9,color:"rgba(255,255,255,0.25)",marginTop:3}}>profit {fmt(payout2-totalStaked)}</div>
                </div>
              </div>
            </>
          )}

          {isArb&&!hasStake&&(
            <div style={{marginTop:12,fontSize:11,color:"rgba(255,255,255,0.35)"}}>
              Enter your bet amount on Book 1 to see the required stake for Book 2 and your guaranteed profit.
            </div>
          )}
        </div>
      )}

      <div style={{marginTop:16,textAlign:"center",fontSize:10,color:"rgba(255,255,255,0.15)",letterSpacing:"1px"}}>
        THE +EV CAVE · ARB CALCULATOR · NOT FINANCIAL ADVICE
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// ROOT APP WITH TABS
// ══════════════════════════════════════════════════════════════════════════════
function App() {
  const [tab, setTab] = useState("ev");

  return (
    <div style={{minHeight:"100vh",background:"#0a0d0f",backgroundImage:"radial-gradient(ellipse at 20% 0%,rgba(0,200,100,0.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(0,180,90,0.04) 0%,transparent 50%)"}}>

      {/* Header */}
      <div style={{textAlign:"center",padding:"28px 16px 0"}}>
        <div style={{fontFamily:"'Syne',sans-serif",fontSize:26,fontWeight:800,color:"#fff",letterSpacing:"-0.5px"}}>
          <span style={{color:"#00dc6e"}}>CAVE</span> CALCULATORS
        </div>
        <div style={{marginTop:6,fontSize:10,color:"rgba(255,255,255,0.3)",letterSpacing:"2px",textTransform:"uppercase"}}>
          The +EV Cave · Betting Tools
        </div>
      </div>

      {/* Tabs */}
      <div style={{padding:"0 16px",maxWidth:580,margin:"0 auto"}}>
        <div style={{marginTop:20}} className="tab-bar">
          <button className={"tab-btn"+(tab==="ev"?" active":"")} onClick={()=>setTab("ev")}>
            +EV CALCULATOR
          </button>
          <button className={"tab-btn"+(tab==="arb"?" active":"")} onClick={()=>setTab("arb")}>
            ARB CALCULATOR
          </button>
        </div>

        {/* Tab content */}
        <div style={{paddingBottom:40}}>
          {tab==="ev"  && <EVCalculator/>}
          {tab==="arb" && <ArbCalculator/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
